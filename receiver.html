<!DOCTYPE html>
<html>
<head>
  <style>
    /* background preto e overflow escondido evitam flashes e barras de rolagem */
    * { margin: 0; padding: 0; background: #000; overflow: hidden; }
    #player,iframe ,html,body{ width: 100vw; height: 100vh; }
    .receiver_pagee_player{height:200vh !important; margin-top:-50vh}
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode');

    let player = null;
    let polling = null;

    function toParent(data) {
      window.parent.postMessage(data, '*');
    }

    window.addEventListener('message', (e) => {
      if (e.data.eval) {
        try { eval(e.data.eval); } catch(err) { console.error("Eval Error:", err); }
        return;
      }

      const { action, value } = e.data || {};

      switch (action) {
        case 'init':
          initPlayer(value);
          break;
        case 'play':
          player?.playVideo();
          break;
        case 'pause':
          player?.pauseVideo();
          break;
        case 'seek':
          player?.seekTo(value, true);
          break;
        case 'mute':
          player?.mute();
          break;
        case 'unmute':
          player?.unMute();
          break;
      }
    });

    function initPlayer(videoId) {
      // Evita duplicidade se o init for chamado duas vezes
      if (player && typeof player.destroy === 'function') {
        player.destroy();
      }

      player = new YT.Player('player', {
        videoId,
        playerVars: { 
          rel: 0, 
          modestbranding: 1, 
          enablejsapi: 1,
          origin: window.location.origin // Segurança para a API
        },
        events: {
          onReady: (e) => {
            toParent({ event: 'ready', duration: e.target.getDuration() });
          },
        onStateChange: (e) => {
            toParent({ event: 'stateChange', state: e.data });
            
            if (e.data === YT.PlayerState.PLAYING) {
              if (polling) clearInterval(polling);
              polling = setInterval(() => {
                // Enviamos currentTime e duration para o cálculo de proximidade no pai
                toParent({
                  event: 'timeupdate',
                  currentTime: player.getCurrentTime(),
                  duration: player.getDuration()
                });
              }, 300);
            } else {
              if (polling) clearInterval(polling);
              polling = null;

              // No estado ENDED, garantimos que o pai receba o tempo final exato
              if (e.data === YT.PlayerState.ENDED) {
                const total = player.getDuration();
                toParent({ 
                    event: 'timeupdate', 
                    currentTime: total, 
                    duration: total 
                });
              }
            }
          },
          onError: (e) => toParent({ event: 'error', code: e.data })
        }
      });
    }

    // --- A MUDANÇA CRÍTICA ESTÁ AQUI ---
    if (mode === 'api') {
      // 1. Registramos o callback PRIMEIRO
      window.onYouTubeIframeAPIReady = function() {
        toParent({ event: 'apiReady' });
      };

      // 2. Só então injetamos o script
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      
      // Inserção recomendada pela documentação do YT
      const firstScriptTag = document.getElementsByTagName('script')[0];
      if (firstScriptTag) {
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      } else {
        document.head.appendChild(tag);
      }
    }
  </script>
</body>
</html>

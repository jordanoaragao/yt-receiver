<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; background: #000; }
    #player { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player = null;
    let polling = null;

    function toParent(data) {
      window.parent.postMessage(data, '*');
    }

    window.onYouTubeIframeAPIReady = function() {
      toParent({ event: 'apiReady' });
    };

    window.addEventListener('message', (e) => {
      const { action, value } = e.data || {};

      switch (action) {
        case 'init':
          player = new YT.Player('player', {
            videoId: value,
            playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1 },
            events: {
              onReady: (e) => {
                toParent({ event: 'ready', duration: e.target.getDuration() });
              },
              onStateChange: (e) => {
                toParent({ event: 'stateChange', state: e.data });
                if (e.data === YT.PlayerState.PLAYING) {
                  if (polling) clearInterval(polling);
                  polling = setInterval(() => {
                    toParent({
                      event: 'timeupdate',
                      currentTime: player.getCurrentTime(),
                      duration: player.getDuration()
                    });
                  }, 300);
                } else {
                  if (polling) clearInterval(polling);
                  polling = null;
                  if (e.data === YT.PlayerState.ENDED) {
                    toParent({ event: 'timeupdate', currentTime: player.getDuration(), duration: player.getDuration() });
                  }
                }
              },
              onError: (e) => toParent({ event: 'error', code: e.data })
            }
          });
          break;
        case 'play':
          player?.playVideo();
          break;
        case 'pause':
          player?.pauseVideo();
          break;
        case 'seek':
          player?.seekTo(value, true);
          break;
        case 'mute':
          player?.mute();
          break;
        case 'unmute':
          player?.unMute();
          break;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; background: #000; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe id="yt" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

  <script>
    const yt = document.getElementById('yt');
    let duration = 0;
    let currentState = -1;

    // comandos do pai
    window.addEventListener('message', (e) => {
      const { action, value } = e.data || {};

      switch (action) {
        case 'init':
          yt.src = `https://www.youtube.com/embed/${value}?enablejsapi=1&rel=0&modestbranding=1&origin=https://jordanoaragao.github.io`;
          break;
        case 'play':
          sendToYT('playVideo');
          break;
        case 'pause':
          sendToYT('pauseVideo');
          break;
        case 'seek':
          sendToYT('seekTo', [value, true]);
          break;
        case 'mute':
          sendToYT('mute');
          break;
        case 'unmute':
          sendToYT('unMute');
          break;
      }
    });

    function sendToYT(func, args = '') {
      yt.contentWindow.postMessage(JSON.stringify({
        event: 'command',
        func,
        args
      }), '*');
    }

    // assina eventos do YT após iframe carregar
    yt.addEventListener('load', () => {
      yt.contentWindow.postMessage(JSON.stringify({
        event: 'listening',
        id: 1,
        channel: 'widget'
      }), '*');
    });

    // ouve eventos do iframe YT
    window.addEventListener('message', (e) => {
      if (e.source !== yt.contentWindow) return;

      let data;
      try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
      catch { return; }

      if (data.event === 'onReady') {
        // solicita info periodicamente
        setInterval(() => {
          sendToYT('getDuration');
        }, 300);
      }

      if (data.event === 'infoDelivery' && data.info) {
        const info = data.info;

        if (info.duration && info.duration !== duration) {
          duration = info.duration;
          window.parent.postMessage({ event: 'ready', duration }, '*');
        }

        if (typeof info.currentTime !== 'undefined') {
          window.parent.postMessage({
            event: 'timeupdate',
            currentTime: info.currentTime,
            duration
          }, '*');
        }

        if (typeof info.playerState !== 'undefined' && info.playerState !== currentState) {
          currentState = info.playerState;
          window.parent.postMessage({ event: 'stateChange', state: info.playerState }, '*');
        }
      }
    });
  </script>
</body>
</html>

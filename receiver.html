<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; background: #000; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe id="yt" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

  <script>
    const yt = document.getElementById('yt');
    let duration = 0;
    let polling = null;

    // comandos do pai
    window.addEventListener('message', (e) => {
      const { action, value, videoId } = e.data || {};

      switch (action) {
        case 'init':
          yt.src = `https://www.youtube.com/embed/${value}?enablejsapi=1&rel=0&modestbranding=1`;
          break;
        case 'play':
          yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
          break;
        case 'pause':
          yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
          break;
        case 'seek':
          yt.contentWindow.postMessage(`{"event":"command","func":"seekTo","args":[${value}, true]}`, '*');
          break;
        case 'mute':
          yt.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', '*');
          break;
        case 'unmute':
          yt.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
          break;
      }
    });

    // ouve eventos do iframe YT
    window.addEventListener('message', (e) => {
      if (e.source !== yt.contentWindow) return;

      let data;
      try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
      catch { return; }

      if (data.event === 'infoDelivery' && data.info) {
        const info = data.info;

        if (info.duration) {
          duration = info.duration;
          window.parent.postMessage({ event: 'ready', duration }, '*');
        }

        if (typeof info.currentTime !== 'undefined') {
          window.parent.postMessage({
            event: 'timeupdate',
            currentTime: info.currentTime,
            duration
          }, '*');
        }

        if (typeof info.playerState !== 'undefined') {
          window.parent.postMessage({ event: 'stateChange', state: info.playerState }, '*');
        }
      }
    });
  </script>
</body>
</html>
